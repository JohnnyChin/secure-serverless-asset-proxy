AWSTemplateFormatVersion: "2010-09-09"
Description: "S3 private assets via Lambda Function URL behind CloudFront"

Parameters:
  ProjectName:
    Type: String
    Default: s3-lambda-cdn-challenge

  BucketName:
    Type: String
    Description: Globally unique bucket name

  ImageUri:
    Type: String
    Description: ECR image URI including immutable tag

Resources:
  AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  # AppEcrRepository:
  #   Type: AWS::ECR::Repository
  #   Properties:
  #     RepositoryName: !Sub "${ProjectName}"
  #     ImageTagMutability: IMMUTABLE
  #     ImageScanningConfiguration:
  #       ScanOnPush: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: LambdaAssumeRole
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: logs-and-s3-read
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Sid: ReadObjectsOnly
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "${AssetsBucket.Arn}/*"

  AssetReaderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-reader"
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Architectures:
        - x86_64
      Environment:
        Variables:
          BUCKET_NAME: !Ref AssetsBucket

  AssetReaderFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref AssetReaderFunction
      AuthType: AWS_IAM
      InvokeMode: BUFFERED

  LambdaUrlOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-lambda-url-oac"
        Description: OAC for Lambda Function URL origin
        OriginAccessControlOriginType: lambda
        SigningBehavior: always
        SigningProtocol: sigv4

  QueryStringCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub "${ProjectName}-cache-policy"
        DefaultTTL: 60
        MinTTL: 0
        MaxTTL: 86400
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: whitelist
            QueryStrings:
              - key

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${ProjectName} distribution"
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100
        DefaultCacheBehavior:
          TargetOriginId: lambda-url-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: !Ref QueryStringCachePolicy
        Origins:
          - Id: lambda-url-origin
            DomainName: !Select [2, !Split ["/", !GetAtt AssetReaderFunctionUrl.FunctionUrl]]
            OriginAccessControlId: !GetAtt LambdaUrlOriginAccessControl.Id
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              HTTPSPort: 443
              OriginSSLProtocols:
                - TLSv1.2
        DefaultRootObject: ""

  AllowCloudFrontInvokeFunctionUrl:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AssetReaderFunction
      Action: lambda:InvokeFunctionUrl
      Principal: cloudfront.amazonaws.com
      SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"
      FunctionUrlAuthType: AWS_IAM

  AllowCloudFrontInvokeFunction:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AssetReaderFunction
      Action: lambda:InvokeFunction
      Principal: cloudfront.amazonaws.com
      SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"
      InvokedViaFunctionUrl: true

Outputs:
  AssetsBucketName:
    Value: !Ref AssetsBucket

  EcrRepositoryUri:
    Value: !GetAtt AppEcrRepository.RepositoryUri

  LambdaFunctionName:
    Value: !Ref AssetReaderFunction

  LambdaFunctionUrl:
    Value: !GetAtt AssetReaderFunctionUrl.FunctionUrl

  CloudFrontDomainName:
    Value: !GetAtt CloudFrontDistribution.DomainName